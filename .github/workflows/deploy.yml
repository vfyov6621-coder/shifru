name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Remove API routes (not compatible with static export)
        run: rm -rf src/app/api

      - name: Build static site
        run: npm run build:gh
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - name: Prepare deploy folder
        run: |
          # Next.js с basePath создаёт .next/<basePath>/
          # GitHub Pages уже даёт /shifru/, поэтому берём содержимое .next/shifru/
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -d ".next/$REPO_NAME" ]; then
            mv ".next/$REPO_NAME" _site
          else
            mv .next _site
          fi
          # Копируем _next/ ресурсы если они на уровень выше
          if [ -d ".next/_next" ] && [ ! -d "_site/_next" ]; then
            cp -r ".next/_next" "_site/_next"
          fi
          # 404 для SPA routing
          cp _site/index.html _site/404.html 2>/dev/null || true
          ls -la _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4